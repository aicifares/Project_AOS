<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin — Gestion des Tables</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .navbar {
            background: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 { font-size: 22px; }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header-section h2 {
            font-size: 28px;
            color: #2c3e50;
        }

        .btn-ajouter {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
        }

        .btn-ajouter:hover { background: #219a52; }

        /* TABLE */
        table {
            width: 100%;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-collapse: collapse;
            overflow: hidden;
        }

        thead {
            background: #2c3e50;
            color: white;
        }

        thead th {
            padding: 15px 20px;
            text-align: left;
            font-size: 15px;
        }

        tbody tr {
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }

        tbody tr:hover { background: #f9f9f9; }

        tbody td {
            padding: 15px 20px;
            font-size: 15px;
            color: #444;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }

        .badge.disponible   { background: #d5f5e3; color: #27ae60; }
        .badge.indisponible { background: #fadbd8; color: #e74c3c; }

        .btn-modifier {
            background: #2980b9;
            color: white;
            border: none;
            padding: 7px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 5px;
        }

        .btn-supprimer {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 7px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-modifier:hover  { background: #2471a3; }
        .btn-supprimer:hover { background: #c0392b; }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: white;
            border-radius: 10px;
            padding: 30px;
            width: 450px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .modal h3 {
            font-size: 22px;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 15px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-save {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
            flex: 1;
        }

        .btn-cancel {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
            flex: 1;
        }

        .message-success {
            background: #d5f5e3;
            color: #27ae60;
            padding: 10px 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .message-error {
            background: #fadbd8;
            color: #e74c3c;
            padding: 10px 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <h1>🍽️ Restaurant — Admin</h1>
        <div>
            <a href="/">Accueil</a>
            <a href="/admin-tables/">Gestion Tables</a>
        </div>
    </nav>

    <div class="container">

        <!-- MESSAGES -->
        <div class="message-success" id="msg-success"></div>
        <div class="message-error"   id="msg-error"></div>

        <!-- HEADER -->
        <div class="header-section">
            <h2>🪑 Gestion des Tables</h2>
            <button class="btn-ajouter" onclick="ouvrirModalAjouter()">
                + Ajouter une table
            </button>
        </div>

        <!-- TABLEAU DES TABLES -->
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Numéro</th>
                    <th>Capacité</th>
                    <th>Localisation</th>
                    <th>Statut</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tables-body">
                <tr>
                    <td colspan="6" style="text-align:center; padding:30px; color:#888;">
                        Chargement...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- MODAL AJOUTER / MODIFIER -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h3 id="modal-titre">Ajouter une table</h3>
            <input type="hidden" id="table-id" />

            <div class="form-group">
                <label>Numéro de la table</label>
                <input type="text" id="input-numero" placeholder="ex: T6" />
            </div>

            <div class="form-group">
                <label>Capacité (nombre de personnes)</label>
                <input type="number" id="input-capacite" min="1" max="20" />
            </div>

            <div class="form-group">
                <label>Localisation</label>
                <select id="input-localisation">
                    <option value="interieur">Intérieur</option>
                    <option value="terrasse">Terrasse</option>
                    <option value="salon_prive">Salon Privé</option>
                </select>
            </div>

            <div class="form-group">
                <label>Statut</label>
                <select id="input-statut">
                    <option value="disponible">Disponible</option>
                    <option value="indisponible">Indisponible</option>
                </select>
            </div>

            <div class="modal-buttons">
                <button class="btn-save"   onclick="sauvegarderTable()">💾 Sauvegarder</button>
                <button class="btn-cancel" onclick="fermerModal()">Annuler</button>
            </div>
        </div>
    </div>

    <script>
        // ─── Charger les tables au démarrage ───
        window.onload = function() {
            chargerTables();
        }

        async function chargerTables() {
            try {
                const response = await fetch('/api/tables/');
                const data     = await response.json();
                afficherTables(data.data);
            } catch (error) {
                afficherErreur('Erreur de connexion au serveur');
            }
        }

        function afficherTables(tables) {
            const tbody = document.getElementById('tables-body');

            if (tables.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" style="text-align:center; padding:30px; color:#888;">
                            Aucune table trouvée
                        </td>
                    </tr>`;
                return;
            }

            tbody.innerHTML = tables.map((table, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td><strong>${table.numero}</strong></td>
                    <td>${table.capacite} personnes</td>
                    <td>${table.localisation}</td>
                    <td>
                        <span class="badge ${table.statut}">
                            ${table.statut}
                        </span>
                    </td>
                    <td>
                        <button class="btn-modifier"
                            onclick="ouvrirModalModifier(${table.id}, '${table.numero}',
                                ${table.capacite}, '${table.localisation}', '${table.statut}')">
                            ✏️ Modifier
                        </button>
                        <button class="btn-supprimer"
                            onclick="supprimerTable(${table.id})">
                            🗑️ Supprimer
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // ─── MODAL AJOUTER ───
        function ouvrirModalAjouter() {
            document.getElementById('modal-titre').textContent  = 'Ajouter une table';
            document.getElementById('table-id').value          = '';
            document.getElementById('input-numero').value      = '';
            document.getElementById('input-capacite').value    = '';
            document.getElementById('input-localisation').value = 'interieur';
            document.getElementById('input-statut').value      = 'disponible';
            document.getElementById('modal-overlay').classList.add('active');
        }

        // ─── MODAL MODIFIER ───
        function ouvrirModalModifier(id, numero, capacite, localisation, statut) {
            document.getElementById('modal-titre').textContent   = 'Modifier la table';
            document.getElementById('table-id').value           = id;
            document.getElementById('input-numero').value       = numero;
            document.getElementById('input-capacite').value     = capacite;
            document.getElementById('input-localisation').value = localisation;
            document.getElementById('input-statut').value       = statut;
            document.getElementById('modal-overlay').classList.add('active');
        }

        function fermerModal() {
            document.getElementById('modal-overlay').classList.remove('active');
        }

        // ─── SAUVEGARDER (Ajouter ou Modifier) ───
        async function sauvegarderTable() {
            const id          = document.getElementById('table-id').value;
            const numero      = document.getElementById('input-numero').value;
            const capacite    = document.getElementById('input-capacite').value;
            const localisation = document.getElementById('input-localisation').value;
            const statut      = document.getElementById('input-statut').value;

            if (!numero || !capacite) {
                afficherErreur('Veuillez remplir tous les champs !');
                return;
            }

            const body = JSON.stringify({ numero, capacite, localisation, statut });

            try {
                let response;

                if (id) {
                    // Modifier
                    response = await fetch(`/api/tables/${id}/modifier/`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body
                    });
                } else {
                    // Ajouter
                    response = await fetch('/api/tables/ajouter/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body
                    });
                }

                const data = await response.json();

                if (data.status === 'success') {
                    fermerModal();
                    chargerTables();
                    afficherSucces(id ? 'Table modifiée avec succès !' : 'Table ajoutée avec succès !');
                } else {
                    afficherErreur('Erreur lors de la sauvegarde');
                }

            } catch (error) {
                afficherErreur('Erreur de connexion');
            }
        }

        // ─── SUPPRIMER ───
        async function supprimerTable(id) {
            if (!confirm('Voulez-vous vraiment supprimer cette table ?')) return;

            try {
                const response = await fetch(`/api/tables/${id}/supprimer/`, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (data.status === 'success') {
                    chargerTables();
                    afficherSucces('Table supprimée avec succès !');
                }
            } catch (error) {
                afficherErreur('Erreur lors de la suppression');
            }
        }

        // ─── MESSAGES ───
        function afficherSucces(msg) {
            const el = document.getElementById('msg-success');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        function afficherErreur(msg) {
            const el = document.getElementById('msg-error');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }
    </script>

</body>
</html>
