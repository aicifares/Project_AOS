<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TableVista — Login</title>
    <link rel="stylesheet" href="https://symmetrical-garbanzo-wr5pqv69gqv7f96xx-8081.app.github.dev/auth/style.css">
</head>
<body class="auth-body">

<div class="auth-card">

    <div class="auth-logo">
        <div class="brand">TableVista</div>
        <div class="tagline">Reservation Platform</div>
    </div>

    <div class="auth-divider"></div>

    <div class="auth-title">Welcome back</div>
    <div class="auth-subtitle">Sign in to manage your reservations</div>

    <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Your email...">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>

    <button class="auth-btn" onclick="login()">Sign In</button>

    <p class="auth-message" id="message"></p>

    <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
    </div>

</div>

<script src="https://symmetrical-garbanzo-wr5pqv69gqv7f96xx-8081.app.github.dev/auth/app.js"></script>
</body>
</html>
