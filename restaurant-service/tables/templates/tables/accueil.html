<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Réservation de Tables</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .navbar {
            background: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 { font-size: 22px; }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .hero {
            background: linear-gradient(135deg, #2c3e50, #e74c3c);
            color: white;
            text-align: center;
            padding: 80px 20px;
        }

        .hero h2 { font-size: 36px; margin-bottom: 10px; }
        .hero p  { font-size: 18px; margin-bottom: 30px; }

        .search-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            display: inline-flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-box input, .search-box select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 15px;
        }

        .search-box button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
        }

        .search-box button:hover { background: #c0392b; }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .table-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .table-card:hover { transform: translateY(-5px); }

        .table-card h3 {
            font-size: 20px;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .table-card p {
            color: #666;
            margin-bottom: 8px;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .badge.disponible   { background: #d5f5e3; color: #27ae60; }
        .badge.indisponible { background: #fadbd8; color: #e74c3c; }

        .buttons-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-detail {
            background: #2980b9;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
            flex: 1;
        }

        .btn-detail:hover { background: #2471a3; }

        .btn-reserver {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
            flex: 1;
        }

        .btn-reserver:hover { background: #c0392b; }

        .message {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <h1>🍽️ Restaurant</h1>
        <div>
            <a href="/">Accueil</a>
            <a href="/admin-tables/">Admin</a>
        </div>
    </nav>

    <!-- HERO + FORMULAIRE RECHERCHE -->
    <div class="hero">
        <h2>Réservez votre table</h2>
        <p>Trouvez la table parfaite pour votre soirée</p>
        <div class="search-box">
            <input type="date" id="date" />
            <input type="time" id="heure" />
            <select id="nb_personnes">
                <option value="1">1 personne</option>
                <option value="2" selected>2 personnes</option>
                <option value="3">3 personnes</option>
                <option value="4">4 personnes</option>
                <option value="6">6 personnes</option>
                <option value="8">8 personnes</option>
            </select>
            <button onclick="rechercherTables()">🔍 Rechercher</button>
        </div>
    </div>

    <!-- RÉSULTATS -->
    <div class="container">
        <h2 id="titre-resultats"></h2>
        <div class="tables-grid" id="tables-grid">
            <p class="message">
                Sélectionnez une date et une heure pour voir les tables disponibles.
            </p>
        </div>
    </div>

    <script>
        // Définir la date minimale = aujourd'hui
        document.getElementById('date').min = new Date().toISOString().split('T')[0];

        async function rechercherTables() {
            const date         = document.getElementById('date').value;
            const heure        = document.getElementById('heure').value;
            const nb_personnes = document.getElementById('nb_personnes').value;

            if (!date || !heure) {
                alert('Veuillez sélectionner une date et une heure !');
                return;
            }

            const grid = document.getElementById('tables-grid');
            grid.innerHTML = '<p class="message">Chargement...</p>';

            try {
                const response = await fetch(
                    `/api/tables/disponibles/?date=${date}&heure=${heure}&nb_personnes=${nb_personnes}`
                );
                const data = await response.json();

                document.getElementById('titre-resultats').textContent =
                    `Tables disponibles (${data.data.length})`;

                if (data.data.length === 0) {
                    grid.innerHTML =
                        '<p class="message">Aucune table disponible pour ce créneau 😕</p>';
                    return;
                }

                grid.innerHTML = data.data.map(table => `
                    <div class="table-card">
                        <h3>Table ${table.numero}</h3>
                        <span class="badge ${table.statut}">${table.statut}</span>
                        <p>👥 Capacité : ${table.capacite} personnes</p>
                        <p>📍 ${table.localisation}</p>
                        <div class="buttons-row">
                            <button class="btn-detail"
                                onclick="window.location.href='/tables/${table.id}/detail/'">
                                🔍 Voir détail
                            </button>
                            <button class="btn-reserver"
                                onclick="reserver(${table.id}, '${date}', '${heure}')">
                                📅 Réserver
                            </button>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                grid.innerHTML =
                    '<p class="message">Erreur de connexion au serveur 😕</p>';
            }
        }

        function reserver(tableId, date, heure) {
            // Rediriger vers le service de réservation (Membre 3)
            window.location.href =
                `http://localhost:8083/reservations/creer/?table_id=${tableId}&date=${date}&heure=${heure}`;
        }
    </script>

</body>
</html>
