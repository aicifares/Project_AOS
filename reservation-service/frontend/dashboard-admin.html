<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin — Réservations</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; display: flex; background: #f5f5f5; }

        .sidebar {
            width: 240px;
            background: #2c3e50;
            color: white;
            min-height: 100vh;
            padding: 20px;
            position: fixed;
        }

        .sidebar h2 { font-size: 20px; margin-bottom: 30px; color: #e74c3c; }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 15px;
        }

        .sidebar a:hover, .sidebar a.active { background: #e74c3c; }

        .sidebar .logout {
            margin-top: 40px;
            background: #c0392b;
            text-align: center;
            cursor: pointer;
        }

        .main {
            margin-left: 240px;
            padding: 30px;
            width: 100%;
        }

        h1 { color: #2c3e50; margin-bottom: 20px; }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .filters input, .filters select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .filters button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        table {
            width: 100%;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-collapse: collapse;
            overflow: hidden;
        }

        th {
            background: #2c3e50;
            color: white;
            padding: 14px;
            text-align: left;
            font-size: 14px;
        }

        td {
            padding: 12px 14px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            color: #444;
        }

        tr:hover td { background: #f9f9f9; }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .EN_ATTENTE  { background: #fef9e7; color: #f39c12; }
        .CONFIRMEE   { background: #d5f5e3; color: #27ae60; }
        .ANNULEE     { background: #fadbd8; color: #e74c3c; }

        .message { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>🍽️ TableVista</h2>
    <a href="dashboard-admin.html" class="active">📅 Dashboard Admin</a>
    <a href="http://localhost:3000/admin_table.html">🪑 Gestion Tables</a>
    <a href="#" class="logout" onclick="logout()">⎋ Déconnexion</a>
</div>

<div class="main">
    <h1>📋 Toutes les Réservations</h1>

    <div class="filters">
        <input type="date" id="filter-date" placeholder="Filtrer par date">
        <select id="filter-statut">
            <option value="">Tous les statuts</option>
            <option value="EN_ATTENTE">EN ATTENTE</option>
            <option value="CONFIRMEE">CONFIRMÉE</option>
            <option value="ANNULEE">ANNULÉE</option>
        </select>
        <button onclick="chargerReservations()">🔍 Filtrer</button>
        <button onclick="resetFiltres()" style="background:#95a5a6">↺ Reset</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>#ID</th>
                <th>Client ID</th>
                <th>Table</th>
                <th>Date</th>
                <th>Heure</th>
                <th>Personnes</th>
                <th>Statut</th>
            </tr>
        </thead>
        <tbody id="reservations-body">
            <tr><td colspan="7" class="message">Chargement...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const API = "http://localhost:8083/api/reservations";
    const token = localStorage.getItem("access");

    if (!token) window.location.href = "http://localhost:8081/auth/login.html";

    async function chargerReservations() {
        const date = document.getElementById("filter-date").value;
        const statut = document.getElementById("filter-statut").value;

        let url = API + "/";
        const params = [];
        if (date) params.push(`date=${date}`);
        if (statut) params.push(`statut=${statut}`);
        if (params.length) url += "?" + params.join("&");

        try {
            const res = await fetch(url, {
                headers: { "Authorization": "Bearer " + token }
            });
            const data = await res.json();
            const reservations = data.data || data;

            const tbody = document.getElementById("reservations-body");

            if (!reservations.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="message">Aucune réservation trouvée</td></tr>';
                return;
            }

            tbody.innerHTML = reservations.map(r => `
                <tr>
                    <td>#${r.id}</td>
                    <td>${r.client_id}</td>
                    <td>Table ${r.table_id}</td>
                    <td>${r.date}</td>
                    <td>${r.heure}</td>
                    <td>${r.nb_personnes} pers.</td>
                    <td><span class="badge ${r.statut}">${r.statut}</span></td>
                </tr>
            `).join('');

        } catch (e) {
            document.getElementById("reservations-body").innerHTML =
                '<tr><td colspan="7" class="message">Erreur de connexion</td></tr>';
        }
    }

    function resetFiltres() {
        document.getElementById("filter-date").value = "";
        document.getElementById("filter-statut").value = "";
        chargerReservations();
    }

    function logout() {
        localStorage.clear();
        window.location.href = "http://localhost:8081/auth/login.html";
    }

    chargerReservations();
</script>
</body>
</html>
